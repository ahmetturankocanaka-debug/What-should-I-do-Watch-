    <style>
        :root {
            /* IMDb Benzeri Tema - Açık */
            --primary-bg: #f3f3f3; /* Açık gri */
            --secondary-bg: #ffffff; /* Beyaz */
            --text-color: #1a1a1a; /* Koyu gri */
            --accent-color: #f5c518; /* IMDb sarısı */
            --button-text-color: #1a1a1a;
            --border-color: #e0e0e0;
            --card-shadow: rgba(0, 0, 0, 0.1);
            --button-hover-bg: #e5b810; /* Koyu sarı */
            --watched-color: #28a745; /* Yeşil */
            --not-watched-color: #6c757d; /* Gri */
            --link-color: #007bff; /* Mavi */
            --link-hover-color: #0056b3; /* Koyu mavi */
            --header-bg: #212121; /* Koyu gri */
            --header-text-color: #f5c518; /* IMDb sarısı */
            --control-bg: #ffffff;
        }

        body.dark-theme {
            /* IMDb Benzeri Tema - Koyu */
            --primary-bg: #1a1a1a; /* Koyu arka plan */
            --secondary-bg: #212121; /* Koyu kartlar */
            --text-color: #f3f3f3; /* Açık yazı */
            --accent-color: #f5c518; /* IMDb sarısı */
            --button-text-color: #1a1a1a;
            --border-color: #333333;
            --card-shadow: rgba(0, 0, 0, 0.4);
            --button-hover-bg: #e5b810;
            --watched-color: #28a745;
            --not-watched-color: #adb5bd;
            --link-color: #66b8ff;
            --link-hover-color: #4da6ff;
            --header-bg: #121212;
            --header-text-color: #f5c518;
            --control-bg: #212121;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        header {
            background-color: var(--header-bg);
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            box-shadow: 0 2px 4px var(--card-shadow);
            margin-bottom: 20px;
            border-radius: 8px;
            color: var(--header-text-color);
        }

        header h1 {
            color: var(--header-text-color);
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-color);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            background-color: var(--control-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 4px var(--card-shadow);
        }

        .controls button,
        .controls select {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: var(--accent-color);
            color: var(--button-text-color);
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.3s ease, color 0.3s ease;
            white-space: nowrap;
            font-weight: 600;
        }

        .controls button:hover,
        .controls select:hover {
            background-color: var(--button-hover-bg);
        }

        .controls select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            padding-right: 30px;
            background-image: url('data:image/svg+xml;utf8,<svg fill="%231a1a1a" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/><path d="M0 0h24v24H0z" fill="none"/></svg>'); /* Dark arrow */
            background-repeat: no-repeat;
            background-position: right 8px top 50%;
            background-size: 20px auto;
        }

        body.dark-theme .controls select {
             background-image: url('data:image/svg+xml;utf8,<svg fill="%23e9ecef" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/><path d="M0 0h24v24H0z" fill="none"/></svg>'); /* Light arrow */
        }


        #theme-switcher {
            display: flex;
            gap: 10px;
        }

        .movie-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }

        .movie-card {
            background-color: var(--secondary-bg);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px var(--card-shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            cursor: pointer; /* Kartın tıklanabilir olduğunu belirtmek için */
        }

        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px var(--card-shadow);
        }

        .movie-card img {
            width: 100%;
            height: 350px; /* Fixed height for posters */
            object-fit: cover;
            display: block;
            border-bottom: 1px solid var(--border-color);
        }

        .movie-info {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .movie-info h3 {
            font-size: 1.4em;
            margin-bottom: 10px;
            color: var(--text-color); /* IMDb temasında başlık da normal yazı rengi gibi */
            min-height: 2.8em; /* Ensure consistent height for titles */
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .movie-info p {
            font-size: 0.9em;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        .movie-info .rating-watched {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            flex-wrap: wrap;
            gap: 5px;
        }

        .movie-info .rating {
            font-weight: bold;
            font-size: 1.1em;
            color: var(--accent-color); /* IMDb sarısı */
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .movie-info .rating svg {
            fill: var(--accent-color);
        }

        .movie-info .watched-status {
            font-size: 0.9em;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 500;
            white-space: nowrap;
        }

        .movie-info .watched-status.watched {
            background-color: var(--watched-color);
            color: white;
        }

        .movie-info .watched-status.not-watched {
            background-color: var(--not-watched-color);
            color: white;
        }

        .movie-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .movie-actions button,
        .movie-actions a {
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 0.85em;
            cursor: pointer;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }

        .movie-actions button {
            background-color: var(--accent-color);
            color: var(--button-text-color);
            border: 1px solid var(--accent-color);
        }

        .movie-actions button:hover {
            background-color: var(--button-hover-bg);
            border-color: var(--button-hover-bg);
        }

        .movie-actions .watched-toggle-btn {
            background-color: var(--not-watched-color);
            border-color: var(--not-watched-color);
            color: white;
        }

        .movie-actions .watched-toggle-btn.watched-btn {
            background-color: var(--watched-color);
            border-color: var(--watched-color);
        }

        .movie-actions .watched-toggle-btn:hover {
            opacity: 0.9;
        }

        .movie-actions a {
            background-color: #343a40; /* Gri arka plan */
            color: white;
            border: 1px solid #343a40;
        }

        .movie-actions a:hover {
            background-color: #23272b; /* Koyu gri */
            border-color: #23272b;
        }

        /* Modal for random suggestion */
        .modal {
            display: none; /* Hidden by default */
            position: fixed; /* Stay in place */
            z-index: 1000; /* Sit on top */
            left: 0;
            top: 0;
            width: 100%; /* Full width */
            height: 100%; /* Full height */
            overflow: auto; /* Enable scroll if needed */
            background-color: rgba(0,0,0,0.7); /* Black w/ opacity */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: var(--secondary-bg);
            margin: auto;
            padding: 30px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            width: 80%;
            max-width: 600px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
            text-align: center;
            animation: fadeIn 0.3s;
        }

        .modal-content img {
            max-width: 80%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .modal-content h2 {
            color: var(--accent-color);
            font-size: 2em;
            margin-bottom: 10px;
        }

        .modal-content h3 {
            color: var(--text-color);
            margin-bottom: 10px;
        }

        .modal-content p {
            margin-bottom: 15px;
            font-size: 1.1em;
            color: var(--text-color);
        }

        .modal-content .modal-actions {
            display: flex;
            justify-content: center;
            flex-wrap: wrap; /* Butonların sığmazsa alt satıra geçmesi için */
            gap: 15px;
            margin-top: 20px;
        }

        .modal-content .modal-actions a { /* Modal içindeki linkleri hedef al */
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            background-color: var(--accent-color);
            color: var(--button-text-color);
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.3s ease;
            text-decoration: none; /* Alt çizgiyi kaldır */
        }
        
        .modal-content .modal-actions a:hover {
             background-color: var(--button-hover-bg);
        }

        .close-button {
            position: absolute;
            top: 15px;
            right: 25px;
            color: var(--text-color);
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close-button:hover,
        .close-button:focus {
            color: #ccc;
            text-decoration: none;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
                align-items: center;
            }

            #theme-switcher {
                flex-direction: column;
                width: 100%;
            }
            #theme-switcher button {
                width: 100%;
            }

            .movie-list {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }

            .movie-card img {
                height: 280px;
            }

            .movie-info h3 {
                font-size: 1.2em;
            }

            .movie-actions button,
            .movie-actions a {
                width: 100%;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.8em;
            }

            .container {
                padding: 0 10px;
            }

            .movie-card img {
                height: 250px;
            }
        }
    </style>
</head>

            ...movie,
            watched: false,
            userRating: null
        }));

        const movieListElement = document.getElementById('movie-list');
        const categoryFilter = document.getElementById('category-filter');
        const randomSuggestBtn = document.getElementById('random-suggest-btn');
        const suggestionModal = document.getElementById('suggestionModal');
        const closeButton = document.querySelector('.close-button');
        
        // Modal elements
        const modalHeaderTitle = document.getElementById('modal-header-title');
        const modalPoster = document.getElementById('modal-poster');
        const modalTitle = document.getElementById('modal-title');
        const modalGenres = document.getElementById('modal-genres');
        const modalDescription = document.getElementById('modal-description');
        const modalImdbLink = document.getElementById('modal-imdb-link');

        const lightThemeBtn = document.getElementById('light-theme-btn');
        const darkThemeBtn = document.getElementById('dark-theme-btn');

        const platformMapping = {
            netflix: { name: "Netflix'te İzle", id: "modal-netflix-link" },
            primevideo: { name: "Prime Video'da İzle", id: "modal-prime-link" },
            disneyplus: { name: "Disney+'ta İzle", id: "modal-disney-link" },
            blutv: { name: "BluTV'de İzle", id: "modal-blutv-link" },
            gain: { name: "Gain'de İzle", id: "modal-gain-link" },
            beinconnect: { name: "beIN CONNECT'te İzle", id: "modal-bein-link" }
        };
        
        /**
         * YENİ FONKSİYON: Dizi bilgilerini modal pencerede gösterir.
         * @param {object} movie - Gösterilecek dizi objesi.
         * @param {boolean} isRandom - Önerinin rastgele olup olmadığını belirtir.
         */
        function showMovieModal(movie, isRandom = false) {
            modalHeaderTitle.textContent = isRandom ? "Size Özel Dizi Önerisi!" : "Dizi Detayları";
            modalPoster.src = movie.poster;
            modalTitle.textContent = movie.title;
            modalGenres.textContent = `Tür: ${movie.genres.join(', ')} | IMDb: ${movie.rating}`;
            modalDescription.textContent = `Bu dizi, ${movie.years} yılları arasında yayınlanmış, ${movie.eps} bölümlük bir ${movie.type}dir.`;

            modalImdbLink.href = movie.platformLink.imdb;

            document.querySelectorAll('.modal-actions .platform-link').forEach(link => {
                link.style.display = 'none';
            });
            
            Object.keys(platformMapping).forEach(platformKey => {
                const linkElement = document.getElementById(platformMapping[platformKey].id);
                if (movie.platformLink[platformKey]) {
                    linkElement.href = movie.platformLink[platformKey];
                    linkElement.style.display = 'inline-block';
                }
            });

            suggestionModal.style.display = 'flex';
        }

        function renderMovies(filteredMovies) {
            movieListElement.innerHTML = '';
            filteredMovies.forEach(movie => {
                const movieCard = document.createElement('div');
                movieCard.classList.add('movie-card');

                movieCard.innerHTML = `
                    <img src="${movie.poster}" alt="${movie.title} Afişi">
                    <div class="movie-info">
                        <h3>${movie.title}</h3>
                        <p>${movie.years} | ${movie.eps} bölüm | ${movie.age}</p>
                        <p><strong>Tür:</strong> ${movie.genres.join(', ')}</p>
                        <p>${movie.type}</p>
                        <div class="rating-watched">
                            <span class="rating">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                                IMDb: ${movie.rating} (${movie.votes})
                            </span>
                            <span class="watched-status ${movie.watched ? 'watched' : 'not-watched'}">
                                ${movie.watched ? 'İzlendi' : 'İzlenmedi'}
                            </span>
                        </div>
                        <div class="movie-actions">
                            <button class="watched-toggle-btn ${movie.watched ? 'watched-btn' : 'not-watched-btn'}" data-id="${movie.id}">
                                ${movie.watched ? 'İzlenmedi Olarak İşaretle' : 'İzlendi Olarak İşaretle'}
                            </button>
                            <button class="rate-btn" data-id="${movie.id}">Puan Ver ${movie.userRating !== null ? `(${movie.userRating}/10)` : ''}</button>
                            <a href="${movie.platformLink.imdb}" target="_blank">IMDb</a>
                            ${Object.keys(movie.platformLink).map(platformKey => {
                                const link = movie.platformLink[platformKey];
                                const platformInfo = platformMapping[platformKey];
                                return (link && platformInfo) ? `<a href="${link}" target="_blank">${platformInfo.name.split('\'')[0]}</a>` : '';
                            }).join('')}
                        </div>
                    </div>
                `;
                
                // YENİ EKLENEN KISIM: Karta tıklama olayı
                movieCard.addEventListener('click', (e) => {
                    // Eğer tıklanan element bir buton veya link ise modalı açma
                    if (e.target.closest('button, a')) {
                        return;
                    }
                    showMovieModal(movie);
                });

                movieListElement.appendChild(movieCard);
            });

            addEventListenersToButtons();
        }

        function addEventListenersToButtons() {
            document.querySelectorAll('.watched-toggle-btn').forEach(button => {
                button.onclick = (e) => {
                    const movieId = parseInt(e.target.dataset.id);
                    const movie = movieData.find(m => m.id === movieId);
                    if (movie) {
                        movie.watched = !movie.watched;
                        renderMovies(filterMovies());
                        saveMovieData();
                    }
                };
            });

            document.querySelectorAll('.rate-btn').forEach(button => {
                button.onclick = (e) => {
                    const movieId = parseInt(e.target.dataset.id);
                    const movie = movieData.find(m => m.id === movieId);
                    if (movie) {
                        let currentRatingText = movie.userRating !== null ? `(Şu anki puanınız: ${movie.userRating}/10)` : '';
                        let newRating = prompt(`"${movie.title}" için 1-10 arası bir puan girin: ${currentRatingText}`);
                        if (newRating === null) return;
                        
                        if (newRating.trim() === '' || isNaN(newRating)) {
                             movie.userRating = null;
                        } else {
                            newRating = parseInt(newRating);
                            if (newRating >= 1 && newRating <= 10) {
                                movie.userRating = newRating;
                            } else {
                                alert("Lütfen 1-10 arası geçerli bir sayı girin.");
                            }
                        }
                        renderMovies(filterMovies());
                        saveMovieData();
                    }
                };
            });
        }

        function filterMovies() {
            const selectedCategory = categoryFilter.value;
            let filtered = movieData;

            if (selectedCategory !== 'all') {
                filtered = filtered.filter(movie => movie.genres.includes(selectedCategory));
            }
            return filtered;
        }

        categoryFilter.addEventListener('change', () => {
            renderMovies(filterMovies());
        });

        randomSuggestBtn.addEventListener('click', () => {
            const unwatchedMovies = movieData.filter(movie => !movie.watched);
            if (unwatchedMovies.length > 0) {
                const randomIndex = Math.floor(Math.random() * unwatchedMovies.length);
                const suggestedMovie = unwatchedMovies[randomIndex];
                // YENİ YAPI: Artık merkezi fonksiyonu çağırıyoruz
                showMovieModal(suggestedMovie, true); 
            } else {
                alert("Tebrikler! Tüm dizileri izlemişsiniz. Yeni diziler keşfetmeye devam edin veya izlediğiniz dizileri tekrardan puanlayın.");
            }
        });

        closeButton.addEventListener('click', () => {
            suggestionModal.style.display = 'none';
        });

        window.addEventListener('click', (event) => {
            if (event.target == suggestionModal) {
                suggestionModal.style.display = 'none';
            }
        });

        function saveMovieData() {
            const dataToSave = movieData.map(m => ({ id: m.id, watched: m.watched, userRating: m.userRating }));
            localStorage.setItem('movieAppData', JSON.stringify(dataToSave));
        }

        function loadMovieData() {
            const savedData = localStorage.getItem('movieAppData');
            if (savedData) {
                const parsedData = JSON.parse(savedData);
                movieData.forEach(movie => {
                    const savedMovie = parsedData.find(m => m.id === movie.id);
                    if (savedMovie) {
                        movie.watched = savedMovie.watched;
                        movie.userRating = savedMovie.userRating;
                    }
                });
            }
        }

        function setTheme(themeName) {
            document.body.className = '';
            if (themeName === 'dark-theme') {
                document.body.classList.add('dark-theme');
            }
            localStorage.setItem('theme', themeName);
        }

        lightThemeBtn.addEventListener('click', () => setTheme('light-theme'));
        darkThemeBtn.addEventListener('click', () => setTheme('dark-theme'));

        document.addEventListener('DOMContentLoaded', () => {
            loadMovieData();
            const savedTheme = localStorage.getItem('theme') || 'light-theme';
            setTheme(savedTheme);
            renderMovies(filterMovies());
        });
    </script>
</body>
</html>
